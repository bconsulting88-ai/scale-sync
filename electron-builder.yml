appId: com.scalesync.app
productName: ScaleSync
copyright: "Copyright © 2025 ScaleSync"

# ── What to bundle ────────────────────────────────────────────────────────────
files:
  - dist/**/*
  - src/main.js
  - src/preload.js
  - package.json

# Assets (icon lives in assets/)
directories:
  output: release
  buildResources: assets

# ── Native module rebuild ─────────────────────────────────────────────────────
# better-sqlite3 and serialport are native .node modules — must be rebuilt
# against the Electron version's Node ABI before packaging.
# `npm run postinstall` (electron-builder install-app-deps) handles this.
npmRebuild: false

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.business
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  title: "ScaleSync ${version}"
  background: assets/dmg-background.png
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 185
      type: file
    - x: 390
      y: 185
      type: link
      path: /Applications

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ScaleSync

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon: assets/icon.png
  category: Office
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

# ── Auto-update (optional — wire up later) ────────────────────────────────────
publish: null
